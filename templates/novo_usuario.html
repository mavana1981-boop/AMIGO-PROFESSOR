{% extends "base.html" %}
{% block title %}Novo Usuário{% endblock %}
{% block page_title %}Novo Usuário{% endblock %}
{% block content %}
<div style="max-width:640px;">
  <form method="POST" enctype="multipart/form-data">
    <div class="card"><div class="card-body">

      <!-- Foto -->
      <div style="display:flex;align-items:center;gap:20px;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--neutral-100);">
        <div id="fotoPreview" style="width:80px;height:80px;border-radius:50%;background:var(--navy-100);display:flex;align-items:center;justify-content:center;font-size:2rem;color:var(--navy-400);overflow:hidden;flex-shrink:0;border:3px solid var(--neutral-200);">
          📷
        </div>
        <div>
          <label class="form-label">Foto do professor</label>
          <input type="file" name="foto" id="fotoInput" accept="image/*" class="form-control" style="padding:6px;" onchange="previewFoto(this)" />
          <p class="text-muted text-sm" style="margin-top:4px;">JPG, PNG ou GIF · Máximo 2MB</p>
        </div>
      </div>

      <div class="card-title" style="margin-bottom:16px;font-size:.75rem;text-transform:uppercase;letter-spacing:.06em;color:var(--neutral-500);">Dados Pessoais</div>
      <div class="form-row form-row-2">
        <div class="form-group"><label class="form-label">Nome completo *</label>
          <input class="form-control" name="nome" required placeholder="Nome do professor" />
        </div>
        <div class="form-group"><label class="form-label">Telefone / WhatsApp</label>
          <input class="form-control" name="telefone" placeholder="(61) 9 0000-0000" />
        </div>
      </div>
      <div class="form-row form-row-2">
        <div class="form-group"><label class="form-label">E-mail *</label>
          <input class="form-control" type="email" name="email" required placeholder="email@escola.com" />
        </div>
        <div class="form-group"><label class="form-label">Senha inicial *</label>
          <input class="form-control" type="text" name="senha" required placeholder="Mínimo 6 caracteres" minlength="6" />
        </div>
      </div>

      <div class="card-title" style="margin:16px 0;font-size:.75rem;text-transform:uppercase;letter-spacing:.06em;color:var(--neutral-500);">Dados Profissionais</div>
      <div class="form-row form-row-2">
        <div class="form-group"><label class="form-label">Cargo / Função</label>
          <select class="form-control" name="cargo">
            <option value="">— Selecionar —</option>
            {% for c in ['Professor(a)','Coordenador(a)','Diretor(a)','Orientador(a) Educacional','Supervisor(a)','Secretário(a)','Outro'] %}
            <option>{{ c }}</option>{% endfor %}
          </select>
        </div>
        <div class="form-group"><label class="form-label">Disciplina</label>
          <input class="form-control" name="disciplina" placeholder="Ex.: Matemática, Português..." />
        </div>
      </div>
      <div class="form-row form-row-2">
        <div class="form-group"><label class="form-label">Regional de Ensino</label>
          <input class="form-control" name="regional" placeholder="Ex.: CRE Plano Piloto..." />
        </div>
        <div class="form-group"><label class="form-label">Escola / Instituição</label>
          <input class="form-control" name="escola" placeholder="Nome da escola" />
        </div>
      </div>

      <div class="form-actions" style="border:none;margin-top:8px;">
        <button type="submit" class="btn btn-primary">Criar Usuário</button>
        <a href="{{ url_for('auth.usuarios') }}" class="btn btn-outline">Cancelar</a>
      </div>
    </div></div>
  </form>
</div>

<script>
function previewFoto(input) {
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = e => {
      const prev = document.getElementById('fotoPreview');
      prev.innerHTML = `<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover;" />`;
    };
    reader.readAsDataURL(input.files[0]);
  }
}
</script>
{% endblock %}
