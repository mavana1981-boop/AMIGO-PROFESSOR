{% extends "base.html" %}
{% block title %}Novo Registro Pedagógico{% endblock %}
{% block page_title %}Novo Registro Pedagógico{% endblock %}
{% block content %}
<div style="max-width:620px;">
  <form method="POST"><div class="card"><div class="card-body">
    <div class="form-row form-row-2">
      <div class="form-group"><label class="form-label">Aluno *</label>
        <select class="form-control" name="aluno_id" required>
          <option value="">— Selecionar aluno —</option>
          {% for a in alunos %}<option value="{{ a.id }}" {% if aluno_id==a.id %}selected{% endif %}>{{ a.nome }} ({{ a.turma.nome }})</option>{% endfor %}
        </select>
      </div>
      <div class="form-group"><label class="form-label">Data *</label>
        <input class="form-control" type="date" name="data" required />
      </div>
    </div>
    <div class="form-row form-row-2">
      <div class="form-group"><label class="form-label">Tipo de Registro</label>
        <select class="form-control" name="tipo">
          <option value="aprendizado">Aprendizado</option>
          <option value="carencia">Carência / Dificuldade</option>
          <option value="encaminhamento">Encaminhamento</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">Status</label>
        <select class="form-control" name="status">
          <option value="aberto">Aberto</option>
          <option value="em andamento">Em andamento</option>
          <option value="concluído">Concluído</option>
        </select>
      </div>
    </div>
    <div class="form-group"><label class="form-label">Descrição *</label>
      <textarea class="form-control" name="descricao" required rows="4" placeholder="Descreva a situação pedagógica do aluno..."></textarea>
    </div>
    <div class="form-group"><label class="form-label">Encaminhamento</label>
      <input class="form-control" name="encaminhamento" placeholder="Ex.: Psicólogo, Fonoaudiólogo, Reforço escolar..." />
    </div>
    <div class="form-actions" style="border:none;">
      <button type="submit" class="btn btn-primary">Salvar Registro</button>
      <a href="{{ url_for('pedagogico.index') }}" class="btn btn-outline">Cancelar</a>
    </div>
  </div></div></form>
</div>
{% endblock %}
