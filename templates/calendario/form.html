{% extends "base.html" %}
{% block title %}Novo Evento{% endblock %}
{% block page_title %}Novo Evento{% endblock %}
{% block content %}
<div style="max-width:560px;">
  <form method="POST"><div class="card"><div class="card-body">
    <div class="form-group"><label class="form-label">Título *</label>
      <input class="form-control" name="titulo" required placeholder="Ex.: Semana de Provas – 1º Bimestre" />
    </div>
    <div class="form-row form-row-2">
      <div class="form-group"><label class="form-label">Data início *</label>
        <input class="form-control" type="date" name="data_inicio" required />
      </div>
      <div class="form-group"><label class="form-label">Data fim</label>
        <input class="form-control" type="date" name="data_fim" />
      </div>
    </div>
    <div class="form-row form-row-2">
      <div class="form-group"><label class="form-label">Tipo</label>
        <select class="form-control" name="tipo">
          {% for t in ['Feriado','Prova','Reunião','Recesso','Evento escolar','Conselho de Classe','Outro'] %}
          <option>{{ t }}</option>{% endfor %}
        </select>
      </div>
      <div class="form-group"><label class="form-label">Cor</label>
        <input class="form-control" type="color" name="cor" value="#3B82F6" style="padding:4px;cursor:pointer;height:42px;" />
      </div>
    </div>
    <div class="form-group"><label class="form-label">Descrição</label>
      <textarea class="form-control" name="descricao" rows="3" placeholder="Detalhes do evento..."></textarea>
    </div>
    <div class="form-actions" style="border:none;">
      <button type="submit" class="btn btn-primary">Salvar Evento</button>
      <a href="{{ url_for('calendario.index') }}" class="btn btn-outline">Cancelar</a>
    </div>
  </div></div></form>
</div>
{% endblock %}
